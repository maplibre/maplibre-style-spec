<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 270" font-family="system-ui, -apple-system, sans-serif" font-size="14">
  <g transform="translate(10, 30)">
    <rect x="0" y="0" width="250" height="240" fill="#ffffff" stroke="#888"/>
    <text x="125" y="17" text-anchor="middle" font-weight="600">fill-opacity: 0.5</text>
