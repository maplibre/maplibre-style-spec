<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 240" font-size="16" font-weight="600" font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="1080" height="240" fill="#fff"/>
  <!-- 1: no opacity -->
  <g transform="translate(0, 0)">

    <text x="125" y="20" text-anchor="middle">
      default/full opacity
    </text>

    <polygon
      points="20,210 100,30 180,210"
      fill="#1f77b4"
    />
    <polygon
      points="70,210 150,30 230,210"
      fill="#d62728"
    />
  </g>

  <!-- 2: fill-layer-opacity -->
  <g transform="translate(270, 0)">

    <text x="125" y="20" text-anchor="middle">
      fill-layer-opacity: 0.5
    </text>

    <g opacity="0.5">
      <polygon
        points="20,210 100,30 180,210"
        fill="#1f77b4"
      />
      <polygon
        points="70,210 150,30 230,210"
        fill="#d62728"
      />
    </g>
  </g>

  <!-- 3: combined -->
  <g transform="translate(540, 0)">

    <text x="125" y="20" text-anchor="middle">
      fill-opacity: 0.5 + fill-layer-opacity: 0.5
    </text>

    <g opacity="0.5">
      <polygon
        points="20,210 100,30 180,210"
        fill="#1f77b4"
        fill-opacity="0.5"
      />
      <polygon
        points="70,210 150,30 230,210"
        fill="#d62728"
        fill-opacity="0.5"
      />
    </g>
  </g>

  <!-- 4: fill-opacity -->
  <g transform="translate(810, 0)">

    <text x="125" y="20" text-anchor="middle">
      fill-opacity: 0.5
    </text>

    <polygon
      points="20,210 100,30 180,210"
      fill="#1f77b4"
      fill-opacity="0.5"
    />
    <polygon
      points="70,210 150,30 230,210"
      fill="#d62728"
      fill-opacity="0.5"
    />
  </g>
</svg>
